<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRMIS MDS V6 STABLE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0b3d2e,#145c43,#0f2f24);
  color:white;
}

/* LOGIN */
#login{
  width:320px;
  margin:100px auto;
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:12px;
}

/* APP */
#app{display:none;}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.4);
  align-items:center;
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:rgba(0,0,0,0.25);
  min-height:100vh;
  padding:10px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#0b3d2e;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:15px;
}

/* PANEL */
.panel{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* INPUT */
input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

/* MOBILE */
@media(max-width:768px){
  .container{flex-direction:column;}
  .sidebar{width:100%;}
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="login">
<h3>LOGIN HRMIS</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

<div class="header">
<div>🏛️ HRMIS MDS V6</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<button onclick="load()">📊 Dashboard</button>
<button onclick="toggleForm()">➕ Tambah Pegawai</button>
<button onclick="load()">🔄 Refresh</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- KPI -->
<div class="panel">
<h3>📊 KPI Kehadiran</h3>
<canvas id="chart"></canvas>
</div>

<!-- SEARCH -->
<div class="panel">
<input id="search" placeholder="🔍 Cari pegawai..." oninput="renderList()">
</div>

<!-- LIST -->
<div class="panel">
<h3>👨‍💼 Senarai Pegawai</h3>
<div id="list"></div>
</div>

<!-- FORM -->
<div class="panel" id="form" style="display:none;">
<h3>➕ Tambah Pegawai</h3>

<input id="nama" placeholder="Nama">
<input id="jawatan" placeholder="Jawatan">
<input id="jabatan" placeholder="Jabatan">

<select id="status">
<option value="Hadir">Hadir</option>
<option value="Cuti">Cuti</option>
</select>

<input id="catatan" placeholder="Catatan">

<button onclick="add()">Simpan</button>
</div>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwGv6g3d4LTk4FyflxMVTG0a7FCF6YxSOa6KORo6fZua9W6nSZKqhJ9tKiZJqHrvWX3kw/exec";

let DATA = [];
let chartInstance;

/* ================= API SAFE ================= */
async function api(payload){

  try{

    const res = await fetch(API,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    if(!res.ok) throw new Error("HTTP "+res.status);

    const text = await res.text();

    try{
      return JSON.parse(text);
    }catch(e){
      throw new Error("Invalid JSON response");
    }

  }catch(err){
    console.log(err);
    alert("API connection failed");
  }
}

/* ================= LOGIN ================= */
async function login(){

  const r = await api({
    action:"login",
    username: document.getElementById("u").value,
    password: document.getElementById("p").value
  });

  if(r && r.status==="ok"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    load();
  }else{
    alert("Login gagal");
  }
}

/* ================= LOAD DATA ================= */
async function load(){

  const d = await api({action:"getPegawai"});
  if(!d) return;

  DATA = d;

  renderList();
  renderChart();
}

/* ================= LIST ================= */
function renderList(){

  const keyword = (document.getElementById("search").value || "").toLowerCase();

  let html = "";

  DATA
  .filter(x => (x.nama||"").toLowerCase().includes(keyword))
  .forEach(x=>{

    html += `
      <div style="padding:6px;border-bottom:1px solid #ccc">
        ${x.nama} - ${x.jawatan} (${x.status})
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* ================= CHART ================= */
function renderChart(){

  let hadir = DATA.filter(x=>x.status==="Hadir").length;
  let cuti  = DATA.filter(x=>x.status==="Cuti").length;

  if(chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("chart");

  chartInstance = new Chart(ctx,{
    type:"bar",
    data:{
      labels:["Hadir","Cuti"],
      datasets:[{
        data:[hadir,cuti],
        backgroundColor:["#00ff99","#ff4d4d"]
      }]
    }
  });
}

/* ================= TOGGLE ================= */
function toggleForm(){
  const f = document.getElementById("form");
  f.style.display = (f.style.display==="block") ? "none":"block";
}

/* ================= ADD ================= */
async function add(){

  await api({
    action:"addPegawai",
    nama: document.getElementById("nama").value,
    jawatan: document.getElementById("jawatan").value,
    jabatan: document.getElementById("jabatan").value,
    status: document.getElementById("status").value,
    catatan: document.getElementById("catatan").value
  });

  toggleForm();
  load();
}

/* ================= LOGOUT ================= */
function logout(){
  location.reload();
}

</script>

</body>
</html>
