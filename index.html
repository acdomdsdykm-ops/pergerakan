<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRMIS MDS V6 FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0b3d2e,#145c43,#0f2f24);
  color:white;
}

#login{
  width:320px;
  margin:100px auto;
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:12px;
}

#app{display:none;}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.4);
}

.container{display:flex;}

.sidebar{
  width:220px;
  background:rgba(0,0,0,0.25);
  min-height:100vh;
  padding:10px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#0b3d2e;
  color:#fff;
  border:none;
}

.main{flex:1;padding:15px;}

.panel{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="loginBox">
<h3>LOGIN</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="doLogin()">Login</button>
</div>

<div id="app">

<div class="header">
<div>🏛️ HRMIS V6 FIXED</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="sidebar">
<button onclick="load()">Dashboard</button>
<button onclick="toggleForm()">Tambah</button>
</div>

<div class="main">

<div class="panel">
<h3>KPI</h3>
<canvas id="chart"></canvas>
</div>

<div class="panel">
<input id="search" placeholder="Cari..." oninput="renderList()">
</div>

<div class="panel">
<h3>Senarai</h3>
<div id="list"></div>
</div>

<div class="panel" id="form" style="display:none;">
<h3>Tambah Pegawai</h3>

<input id="nama">
<input id="jawatan">
<input id="jabatan">

<select id="status">
<option>Hadir</option>
<option>Cuti</option>
</select>

<input id="catatan">

<button onclick="add()">Simpan</button>
</div>

</div>
</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw4yR7BAW3tJhGsVbgRHdPe4VMOpXNnIDKTr--yvXHhFqQCDL-a0Vn069YkBzNTrf_TXg/exec";

let DATA = [];
let chart;

/* ================= SAFE API (FIXED CORS) ================= */
async function api(payload){

  const form = new URLSearchParams();

  for(const k in payload){
    form.append(k, payload[k]);
  }

  const res = await fetch(API,{
    method:"POST",
    body: form
  });

  return await res.json();
}

/* ================= LOGIN ================= */
async function doLogin(){

  const r = await api({
    action:"login",
    username: u.value,
    password: p.value
  });

  if(r.status==="ok"){
    document.getElementById("loginBox").style.display="none";
    app.style.display="block";
    load();
  }else{
    alert("Login gagal");
  }
}

/* ================= LOAD ================= */
async function load(){

  DATA = await (await fetch(API+"?action=getPegawai")).json();

  renderList();
  renderChart();
}

/* ================= LIST ================= */
function renderList(){

  const key = search.value.toLowerCase();

  list.innerHTML = DATA
    .filter(x => (x.nama||"").toLowerCase().includes(key))
    .map(x =>
      `<div>${x.nama} - ${x.jawatan} (${x.status})</div>`
    ).join("");
}

/* ================= CHART ================= */
function renderChart(){

  const hadir = DATA.filter(x=>x.status==="Hadir").length;
  const cuti = DATA.filter(x=>x.status==="Cuti").length;

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["Hadir","Cuti"],
      datasets:[{
        data:[hadir,cuti],
        backgroundColor:["#00ff99","#ff4d4d"]
      }]
    }
  });
}

/* ================= ADD ================= */
async function add(){

  await api({
    action:"addPegawai",
    nama:nama.value,
    jawatan:jawatan.value,
    jabatan:jabatan.value,
    status:status.value,
    catatan:catatan.value
  });

  toggleForm();
  load();
}

/* ================= UI ================= */
function toggleForm(){
  form.style.display = form.style.display==="block"?"none":"block";
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
