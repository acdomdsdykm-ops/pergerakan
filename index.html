<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HRMIS MDS FINAL</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b3d2e;color:#fff;}
#login{width:300px;margin:120px auto;background:#fff;color:#000;padding:20px;border-radius:10px;}
#app{display:none;}
.panel{background:rgba(255,255,255,0.1);padding:10px;margin:10px;}
</style>
</head>

<body>

<div id="login">
<h3>LOGIN HRMIS</h3>
<input id="u"><br><br>
<input id="p" type="password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="app">

<h3>HRMIS DASHBOARD</h3>
<button onclick="logout()">Logout</button>

<div class="panel">
<button onclick="load()">Load Pegawai</button>
<div id="list"></div>
</div>

<div class="panel">
<input id="nama" placeholder="Nama">
<input id="jawatan" placeholder="Jawatan">
<input id="jabatan" placeholder="Jabatan">
<input id="status" placeholder="Status">
<button onclick="add()">Tambah</button>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwQYe-_oZnd2sMXHpSj2Z81PuTS0DkLiVxDW2m4trY28Q1dxkTvY0QG_6ZLv92QvT3uuw/exec";

/* ================= API CALL ================= */
async function api(data){
  let r=await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
  return r.json();
}

/* ================= LOGIN ================= */
async function login(){

let r=await api({
action:"login",
username:u.value,
password:p.value
});

if(r.status=="ok"){
sessionStorage.setItem("role",r.role);
login.style.display="none";
app.style.display="block";
load();
}else{
alert("Login gagal");
}
}

/* ================= LOAD ================= */
async function load(){

let d=await api({action:"getPegawai"});

let h="";
d.forEach(x=>{
h+=`<div>${x.nama} - ${x.jawatan} (${x.status})</div>`;
});

list.innerHTML=h;
}

/* ================= ADD ================= */
async function add(){

await api({
action:"addPegawai",
nama:nama.value,
jawatan:jawatan.value,
jabatan:jabatan.value,
status:status.value
});

load();
}

/* ================= LOGOUT ================= */
function logout(){
sessionStorage.clear();
location.reload();
}

</script>

</body>
</html>
