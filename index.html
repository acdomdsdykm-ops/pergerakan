<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDS Dashboard</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f6f9;
}
.header{
  background:#0b3d2e;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{padding:15px;}

.panel{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select,button{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  cursor:pointer;
  background:#0b3d2e;
  color:white;
  border:none;
}

.card{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
}

.card img{
  width:40px;
  height:40px;
  border-radius:50%;
}

/* MOBILE */
@media(max-width:768px){
  .header{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="header">
  <div><b>MAJLIS DAERAH SIMUNJAN</b></div>
  <div>
    <button onclick="downloadPDF()">📄 PDF</button>
    <button onclick="logout()">Logoff</button>
  </div>
</div>

<div class="container">

<!-- DASHBOARD SUMMARY -->
<div class="panel">
  <h3>📊 Summary Jabatan</h3>
  <div id="summary"></div>
</div>

<!-- FILTER -->
<div class="panel">
  <h3>🔍 Carian</h3>
  <input id="search" placeholder="Cari nama..." onkeyup="filter()">
</div>

<!-- FORM -->
<div class="panel">
  <h3>Tambah Pegawai</h3>
  <input id="nama" placeholder="Nama">
  <input id="jawatan" placeholder="Jawatan">
  <input id="jabatan" placeholder="Jabatan">
  <input id="status" placeholder="Status">
  <input type="file" id="file">
  <button onclick="add()">Tambah</button>
</div>

<!-- LIST BY JABATAN -->
<div class="panel">
  <h3>🏢 Senarai Mengikut Jabatan</h3>
  <div id="list"></div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxGqBk7rG5FmDj_og7Icx2wrfW58JxZw7c7MaMcs0Hj3TOj0r4lMJykVNwsjy_6iO9SvQ/exec";
let dataGlobal=[];

/* LOAD */
async function load(){
  let res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getData"})
  });

  dataGlobal=await res.json();
  render(dataGlobal);
  summary(dataGlobal);
}

/* SUMMARY */
function summary(data){
  let group={};

  data.forEach(d=>{
    group[d.jabatan]=(group[d.jabatan]||0)+1;
  });

  let html="";
  for(let j in group){
    html+=`<div>${j}: <b>${group[j]}</b></div>`;
  }

  summary.innerHTML=html;
}

/* GROUP LIST */
function render(data){
  let group={};

  data.forEach(d=>{
    if(!group[d.jabatan]) group[d.jabatan]=[];
    group[d.jabatan].push(d);
  });

  let html="";

  for(let j in group){
    html+=`<h4>🏢 ${j}</h4>`;

    group[j].forEach(p=>{
      html+=`
      <div class="card">
        <img src="${p.gambar_url}">
        <div>
          <b>${p.nama}</b><br>
          ${p.jawatan} | ${p.status}
        </div>
      </div>`;
    });
  }

  list.innerHTML=html;
}

/* FILTER */
function filter(){
  let k=search.value.toLowerCase();

  let filtered=dataGlobal.filter(d=>
    d.nama.toLowerCase().includes(k)
  );

  render(filtered);
}

/* ADD */
async function add(){
  let file=document.getElementById("file").files[0];
  let base64="";

  if(file){
    base64=await toBase64(file);
  }

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      nama:nama.value,
      jawatan:jawatan.value,
      jabatan:jabatan.value,
      status:status.value,
      image_base64:base64
    })
  });

  load();
}

/* PDF */
function downloadPDF(){
  window.open(API+"?action=pdf","_blank");
}

/* BASE64 */
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.readAsDataURL(file);
    r.onload=()=>res(r.result.split(',')[1]);
  });
}

/* LOGOUT */
function logout(){
  location.reload();
}

load();

</script>

</body>
</html>
