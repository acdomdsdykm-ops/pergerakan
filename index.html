<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR System Pro Full FIX</title>

<style>
:root{
--bg:#0b1220;
--panel:#111827;
--panel2:#0f172a;
--blue:#3b82f6;
--green:#22c55e;
--yellow:#f59e0b;
--red:#ef4444;
--text:#e5e7eb;
}

*{box-sizing:border-box;font-family:system-ui;}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

/* LOGIN */
#loginPage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
background:radial-gradient(circle,#1e293b,#0b1220);
}

input,select,button{
width:260px;
padding:10px;
border:none;
border-radius:10px;
background:var(--panel);
color:white;
outline:none;
}

button{
background:var(--blue);
cursor:pointer;
font-weight:600;
}
button:hover{opacity:0.85;}

/* LAYOUT */
.main{display:none;height:100vh;}
.container{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
width:230px;
background:var(--panel2);
padding:15px;
}

.menu{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:8px;
}
.menu:hover{background:#1f2937;}
.menu.active{background:var(--blue);}

/* PAGE */
.page{
flex:1;
padding:20px;
overflow:auto;
display:none;
}

/* KPI */
.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
margin-top:10px;
}

.kpi{
background:var(--panel);
padding:15px;
border-radius:14px;
text-align:center;
}

/* STAFF */
.staff-card{
display:flex;
justify-content:space-between;
align-items:center;
background:var(--panel);
padding:14px;
border-radius:14px;
margin-bottom:10px;
}

.left{display:flex;gap:12px;align-items:center;}

.avatar{
width:48px;height:48px;border-radius:50%;
object-fit:cover;border:2px solid var(--blue);
}

.status{
font-size:11px;
padding:5px 10px;
border-radius:999px;
cursor:pointer;
display:inline-block;
margin-top:4px;
}

.hadir{background:var(--green);}
.cuti{background:var(--yellow);color:black;}
.tiada{background:var(--red);}
.urusan{background:var(--blue);}

.actions button{
width:32px;height:32px;
margin-left:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.edit{background:var(--blue);}
.delete{background:var(--red);}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:var(--panel);
border-radius:12px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #1f2937;
font-size:14px;
}

th{
background:#1f2937;
text-align:left;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:12px;
}

.small{opacity:0.7;font-size:13px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>HR SYSTEM PRO</h2>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button id="loginBtn">Login</button>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

<div class="sidebar">
<div class="menu active" onclick="show('dashboard',this)">Dashboard</div>
<div class="menu" onclick="show('staff',this)">Staff</div>
<div class="menu" onclick="show('add',this)">Add Staff</div>
<div class="menu" onclick="show('report',this)">Report</div>
</div>

<!-- DASHBOARD -->
<div class="page" id="dashboard">
<h2>Dashboard</h2>
<div class="small" id="clock"></div>

<div class="kpi-grid">
<div class="kpi">Total <h3 id="total">0</h3></div>
<div class="kpi">Hadir <h3 id="hadir">0</h3></div>
<div class="kpi">Cuti <h3 id="cuti">0</h3></div>
<div class="kpi">Tiada <h3 id="tiada">0</h3></div>
<div class="kpi">Urusan <h3 id="urusan">0</h3></div>
</div>
</div>

<!-- STAFF -->
<div class="page" id="staff">
<input id="search" placeholder="Search nama..." oninput="render()">
<div id="staffView"></div>
</div>

<!-- ADD -->
<div class="page" id="add">
<h2>Add / Edit Staff</h2>

<input id="name" placeholder="Nama">
<input id="job" placeholder="Jawatan">
<input id="dept" placeholder="Bahagian">

<input type="file" id="photo">

<select id="status">
<option>Hadir</option>
<option>Cuti</option>
<option>Tiada</option>
<option>Urusan Rasmi Di Luar</option>
</select>

<button onclick="saveStaff()">Simpan</button>
</div>

<!-- REPORT -->
<div class="page" id="report">
<h2>Report</h2>

<div class="filters">
<select id="filterDate" onchange="renderReport()"></select>
<select id="filterDept" onchange="renderReport()"></select>
</div>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Jawatan</th>
<th>Bahagian</th>
<th>Tarikh</th>
<th>Status</th>
</tr>
</thead>
<tbody id="reportBody"></tbody>
</table>
</div>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyUiKO-L6GrTQOla6ROgYElHM8iL26I-JCCurbxNyQ3yQLSifB4V6jNn5ZWOL7tRTWnYQ/exec";

let staff = [];
let reports = {};
let editId = null;

/* ================= LOGIN FIX ================= */
window.login = function(){
const u = document.getElementById("user").value;
const p = document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginPage").style.display="none";
document.querySelector(".main").style.display="flex";
show("dashboard");
loadStaff();
}else{
alert("Login salah");
}
};

document.getElementById("loginBtn").addEventListener("click", window.login);

/* ================= NAV ================= */
window.show = function(id,el){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";

document.querySelectorAll(".menu").forEach(m=>m.classList.remove("active"));
if(el) el.classList.add("active");

render();
if(id==="report") renderReport();
};

/* ================= LOAD ================= */
async function loadStaff(){
try{
const res = await fetch(API,{
method:"POST",
body:JSON.stringify({action:"getStaff"})
});
staff = await res.json();
render();
}catch(e){
console.log(e);
alert("API belum connect / Google Script belum deploy");
}
}

/* ================= SAVE ================= */
window.saveStaff = async function(){

const file = document.getElementById("photo").files[0];

function commit(img){

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"addStaff",
name:name.value,
job:job.value,
dept:dept.value,
status:status.value,
photo:img||"https://i.pravatar.cc/150"
})
});

loadStaff();
show("staff");
}

if(file){
const r = new FileReader();
r.onload=()=>commit(r.result);
r.readAsDataURL(file);
}else commit();
};

/* ================= DELETE ================= */
window.del = async function(id){
await fetch(API,{
method:"POST",
body:JSON.stringify({action:"deleteStaff",id})
});
loadStaff();
};

/* ================= STATUS ================= */
window.toggleStatus = async function(id){

let s = staff.find(x=>x.id===id);
let order=["Hadir","Cuti","Tiada","Urusan Rasmi Di Luar"];
let newStatus = order[(order.indexOf(s.status)+1)%order.length];

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"updateStaff",
id,
name:s.name,
job:s.job,
dept:s.dept,
status:newStatus,
photo:s.photo
})
});

loadStaff();
};

/* ================= RENDER ================= */
function render(){

document.getElementById("clock").innerText = new Date().toLocaleString();

total.innerText = staff.length;
hadir.innerText = staff.filter(s=>s.status==="Hadir").length;
cuti.innerText = staff.filter(s=>s.status==="Cuti").length;
tiada.innerText = staff.filter(s=>s.status==="Tiada").length;
urusan.innerText = staff.filter(s=>s.status==="Urusan Rasmi Di Luar").length;

let kw = (search.value||"").toLowerCase();

let html = staff
.filter(s=>s.name.toLowerCase().includes(kw))
.map(s=>{

let cls =
s.status==="Hadir"?"hadir":
s.status==="Cuti"?"cuti":
s.status==="Tiada"?"tiada":"urusan";

return `
<div class="staff-card">
<div class="left">
<img class="avatar" src="${s.photo}">
<div>
<b>${s.name}</b><br>
<small>${s.job}</small><br>
<small>${s.dept}</small><br>

<span class="status ${cls}" onclick="toggleStatus(${s.id})">
${s.status}
</span>
</div>
</div>

<div class="actions">
<button class="edit" onclick="edit(${s.id})">✏️</button>
<button class="delete" onclick="del(${s.id})">🗑️</button>
</div>
</div>
`;
}).join("");

document.getElementById("staffView").innerHTML = html;

}

/* ================= INIT ================= */
show("dashboard");

</script>

</body>
</html>
