<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pergerakan V2</title>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#eef2f6;
  color:#1a1a1a;
}

/* LOGIN */
#loginBox{
  width:360px;
  margin:120px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  border:1px solid #d9e1ea;
}

/* APP */
#app{
  display:none;
  max-width:1200px;
  margin:25px auto;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #d9e1ea;
}

/* HEADER */
.header{
  background:#0a2a43;
  color:#fff;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* DATETIME (NEW) */
.datetime{
  font-size:18px;
  font-weight:600;
  letter-spacing:0.5px;
}

/* LAYOUT */
.container{display:flex}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#f6f8fb;
  border-right:1px solid #e2e8f0;
  padding:12px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  background:#0a2a43;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:18px;
  background:#f3f6fb;
}

/* PANEL */
.panel{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:14px;
  border:1px solid #e5eaf0;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

th{
  background:#f1f5f9;
  text-align:left;
}

/* INPUT */
input,select{
  width:100%;
  padding:9px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #cfd8e3;
}

/* MOBILE */
@media(max-width:900px){
  .container{flex-direction:column}
  .sidebar{width:100%}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h3>LOGIN SISTEM PERGERAKAN</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<!-- HEADER WITH DATETIME -->
<div class="header">
  <div>🏛 Sistem Pergerakan V2</div>

  <!-- LIVE DATE TIME -->
  <div class="datetime" id="datetime">--:--:--</div>

  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<button onclick="load()">Dashboard</button>
<button onclick="toggleForm()">+ Rekod Baru</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- TABLE -->
<div class="panel">
<h3>Rekod Pergerakan</h3>

<table>
<thead>
<tr>
<th>Gambar</th>
<th>Nama</th>
<th>Jawatan</th>
<th>Status</th>
<th>Catatan</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>
</div>

<!-- FORM -->
<div class="panel" id="form" style="display:none;">
<h3>Rekod Baru</h3>

<input type="file" id="photo">

<input id="nama" placeholder="Nama">

<input id="jawatan" placeholder="Jawatan">

<select id="status">
  <option value="Ada">Ada</option>
  <option value="Tiada">Tiada</option>
  <option value="Cuti">Cuti</option>
  <option value="Urusan Rasmi di Luar">Urusan Rasmi di Luar</option>
</select>

<input id="catatan" placeholder="Catatan">

<button onclick="add()">Simpan Rekod</button>
</div>

</div>
</div>
</div>

<script>

const API = "YOUR_SCRIPT_URL";

let DATA = [];

/* ================= LOGIN ================= */
function login(){
  localStorage.setItem("user", u.value);
  loginBox.style.display="none";
  app.style.display="block";
  load();
}

/* ================= LOAD ================= */
async function load(){
  DATA = await (await fetch(API+"?action=getData")).json();
  render();
}

/* ================= RENDER ================= */
function render(){

  list.innerHTML = DATA.map(x=>`

    <tr>
      <td>
        ${x.photo ? `<img src="${x.photo}" style="width:38px;height:38px;border-radius:50%">` : ""}
      </td>

      <td>${x.nama || "-"}</td>
      <td>${x.jawatan || "-"}</td>
      <td>${x.status || "-"}</td>
      <td>${x.catatan || "-"}</td>
    </tr>

  `).join("");
}

/* ================= ADD ================= */
async function add(){

  const file = photo.files[0];

  let img = "";

  if(file){
    img = await new Promise(resolve=>{
      const reader = new FileReader();
      reader.onload = ()=>resolve(reader.result);
      reader.readAsDataURL(file);
    });
  }

  await fetch(API,{
    method:"POST",
    body: new URLSearchParams({
      action:"add",
      nama:nama.value,
      jawatan:jawatan.value,
      status:status.value,
      catatan:catatan.value,
      photo:img
    })
  });

  nama.value="";
  jawatan.value="";
  catatan.value="";
  photo.value="";

  toggleForm();
  load();
}

/* ================= DATETIME LIVE ================= */
function updateTime(){

  const now = new Date();

  const options = {
    weekday:'long',
    year:'numeric',
    month:'long',
    day:'numeric'
  };

  const date = now.toLocaleDateString('ms-MY', options);
  const time = now.toLocaleTimeString('ms-MY');

  document.getElementById("datetime").innerHTML = date + " | " + time;
}

setInterval(updateTime,1000);
updateTime();

/* ================= UI ================= */
function toggleForm(){
  form.style.display = form.style.display==="block"?"none":"block";
}

function logout(){
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
