<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pergerakan V2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#eef2f6;
  color:#1a1a1a;
}

/* LOGIN */
#loginBox{
  width:360px;
  margin:120px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  border:1px solid #d9e1ea;
}

/* APP WRAPPER */
#app{
  display:none;
  max-width:1200px;
  margin:25px auto;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #d9e1ea;
}

/* HEADER */
.header{
  background:#0a2a43;
  color:#fff;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LAYOUT */
.container{display:flex}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#f6f8fb;
  border-right:1px solid #e2e8f0;
  padding:12px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  background:#0a2a43;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:18px;
  background:#f3f6fb;
}

/* PANELS */
.panel{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:14px;
  border:1px solid #e5eaf0;
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.kpi-box{
  background:linear-gradient(135deg,#0a2a43,#1c5c8a);
  color:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.kpi-box h2{
  margin:5px 0 0;
  font-size:26px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

th{
  background:#f1f5f9;
  text-align:left;
}

/* STATUS BADGE */
.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  color:#fff;
}

.pending{background:#f59e0b}
.approved{background:#10b981}
.done{background:#3b82f6}

/* INPUT */
input,select{
  width:100%;
  padding:9px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #cfd8e3;
}

/* MOBILE */
@media(max-width:900px){
  .container{flex-direction:column}
  .sidebar{width:100%}
  .kpi{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h3>LOGIN SISTEM PERGERAKAN</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<div>🏛 Sistem Pergerakan V2</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<button onclick="load()">Dashboard</button>
<button onclick="toggleForm()">+ Rekod Baru</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- KPI -->
<div class="panel">
<h3>📊 Dashboard</h3>
<div class="kpi">
<div class="kpi-box"><div>Total</div><h2 id="total">0</h2></div>
<div class="kpi-box"><div>Pending</div><h2 id="pending">0</h2></div>
<div class="kpi-box"><div>Approved</div><h2 id="approved">0</h2></div>
</div>
</div>

<!-- SEARCH -->
<div class="panel">
<input id="search" placeholder="Cari rekod..." oninput="render()">
</div>

<!-- TABLE -->
<div class="panel">
<table>
<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>Status</th>
<th>Tindakan</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<!-- FORM -->
<div class="panel" id="form" style="display:none;">
<h3>Rekod Pergerakan Baru</h3>

<input id="nama" placeholder="Nama">
<select id="status">
<option>Pending</option>
<option>Approved</option>
<option>Done</option>
</select>

<button onclick="add()">Simpan</button>
</div>

</div>
</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyNmIrv1ifNBiCeIuLy92qmt9uHp-16FyEXvEaKEptE4HeptYc0JKHpukSMT6grTKBz2g/exec";

let DATA = [];

/* ================= API ================= */
async function api(payload){

  const form = new URLSearchParams();

  for(const k in payload){
    form.append(k, payload[k]);
  }

  const res = await fetch(API,{method:"POST",body:form});
  return res.json();
}

/* ================= LOGIN ================= */
function login(){
  localStorage.setItem("user", u.value);
  loginBox.style.display="none";
  app.style.display="block";
  load();
}

/* ================= LOAD ================= */
async function load(){

  DATA = await (await fetch(API+"?action=getData")).json();

  updateKPI();
  render();
}

/* ================= KPI ================= */
function updateKPI(){

  total.innerText = DATA.length;
  pending.innerText = DATA.filter(x=>x.status==="Pending").length;
  approved.innerText = DATA.filter(x=>x.status==="Approved").length;
}

/* ================= RENDER TABLE ================= */
function render(){

  const k = search.value.toLowerCase();

  list.innerHTML = DATA
    .filter(x => (x.nama||"").toLowerCase().includes(k))
    .map(x=>`
      <tr>
        <td>${x.id}</td>
        <td>${x.nama}</td>
        <td>
          <span class="badge ${
            x.status==="Pending"?"pending":
            x.status==="Approved"?"approved":"done"
          }">${x.status}</span>
        </td>
        <td>
          <button onclick="approve('${x.id}')">Approve</button>
        </td>
      </tr>
    `).join("");
}

/* ================= ADD ================= */
async function add(){

  await api({
    action:"add",
    nama:nama.value,
    status:status.value
  });

  toggleForm();
  load();
}

/* ================= APPROVE ================= */
async function approve(id){

  await api({
    action:"approve",
    id:id
  });

  load();
}

/* ================= UI ================= */
function toggleForm(){
  form.style.display = form.style.display==="block"?"none":"block";
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* ================= AUTO REFRESH ================= */
setInterval(()=>{
  if(app.style.display==="block") load();
},10000);

</script>

</body>
</html>
