<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDS Dashboard</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f6f9;
}

/* TOP BAR */
.topbar{
  background:#0b3d2e;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:230px;
  height:100vh;
  background:#0b3d2e;
  color:white;
  padding-top:60px;
  transition:0.3s;
}

.sidebar button{
  width:100%;
  padding:12px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover{
  background:rgba(255,255,255,0.1);
}

/* MAIN */
.main{
  margin-left:230px;
  padding:15px;
}

/* PANEL */
.panel{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* CARD */
.card{
  display:flex;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
}

.card img{
  width:40px;
  height:40px;
  border-radius:50%;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    position:relative;
    width:100%;
    height:auto;
  }
  .main{
    margin-left:0;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div><b>MAJLIS DAERAH SIMUNJAN</b></div>
  <button onclick="logout()">Logoff</button>
</div>

<!-- SIDEBAR MENU -->
<div class="sidebar">
  <button onclick="show('summary')">📊 Summary Jabatan</button>
  <button onclick="show('search')">🔍 Carian</button>
  <button onclick="show('add')">➕ Tambah Pegawai</button>
  <button onclick="show('list')">🏢 Senarai Jabatan</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

<!-- SUMMARY -->
<div id="summary" class="panel section">
  <h3>📊 Summary Jabatan</h3>
  <div id="summaryBox"></div>
</div>

<!-- SEARCH -->
<div id="search" class="panel section" style="display:none;">
  <h3>🔍 Carian Pegawai</h3>
  <input id="searchInput" placeholder="Cari nama..." onkeyup="filterData()" style="width:100%;padding:10px;">
  <div id="searchResult"></div>
</div>

<!-- ADD -->
<div id="add" class="panel section" style="display:none;">
  <h3>➕ Tambah Pegawai</h3>
  <input id="nama" placeholder="Nama"><br><br>
  <input id="jawatan" placeholder="Jawatan"><br><br>
  <input id="jabatan" placeholder="Jabatan"><br><br>
  <input id="status" placeholder="Status"><br><br>
  <input type="file" id="file"><br><br>
  <button onclick="add()">Simpan</button>
</div>

<!-- LIST -->
<div id="list" class="panel section" style="display:none;">
  <h3>🏢 Senarai Mengikut Jabatan</h3>
  <div id="listBox"></div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxGqBk7rG5FmDj_og7Icx2wrfW58JxZw7c7MaMcs0Hj3TOj0r4lMJykVNwsjy_6iO9SvQ/exec";
let dataGlobal=[];

/* LOAD DATA */
async function load(){
  let res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getData"})
  });

  dataGlobal=await res.json();

  renderSummary();
  renderList();
}

/* NAVIGATION */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* SUMMARY */
function renderSummary(){
  let group={};

  dataGlobal.forEach(d=>{
    group[d.jabatan]=(group[d.jabatan]||0)+1;
  });

  let html="";
  for(let j in group){
    html+=`<div>🏢 ${j} : <b>${group[j]}</b></div>`;
  }

  summaryBox.innerHTML=html;
}

/* LIST BY JABATAN */
function renderList(){
  let group={};

  dataGlobal.forEach(d=>{
    if(!group[d.jabatan]) group[d.jabatan]=[];
    group[d.jabatan].push(d);
  });

  let html="";

  for(let j in group){
    html+=`<h4>🏢 ${j}</h4>`;

    group[j].forEach(p=>{
      html+=`
      <div class="card">
        <img src="${p.gambar_url}">
        <div>
          <b>${p.nama}</b><br>
          ${p.jawatan} | ${p.status}
        </div>
      </div>`;
    });
  }

  listBox.innerHTML=html;
}

/* SEARCH */
function filterData(){
  let k=searchInput.value.toLowerCase();

  let filtered=dataGlobal.filter(d=>
    d.nama.toLowerCase().includes(k) ||
    d.jawatan.toLowerCase().includes(k)
  );

  let html="";

  filtered.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.gambar_url}">
      <div>
        <b>${p.nama}</b><br>
        ${p.jawatan} | ${p.status}
      </div>
    </div>`;
  });

  searchResult.innerHTML=html;
}

/* ADD */
async function add(){
  let file=document.getElementById("file").files[0];
  let base64="";

  if(file){
    base64=await toBase64(file);
  }

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      nama:nama.value,
      jawatan:jawatan.value,
      jabatan:jabatan.value,
      status:status.value,
      image_base64:base64
    })
  });

  load();
}

/* BASE64 */
function toBase64(file){
  return new Promise(res=>{
    let r=new FileReader();
    r.readAsDataURL(file);
    r.onload=()=>res(r.result.split(',')[1]);
  });
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* INIT */
load();

</script>

</body>
</html>
