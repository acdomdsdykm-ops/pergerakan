<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard Pergerakan Pegawai - Majlis Daerah Simunjan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f3d2e, #145a32);
  color:#fff;
}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  padding:15px 25px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}
.header img {
  width:60px;
  margin-right:15px;
}
.header h1 {
  margin:0;
  font-size:20px;
}

/* CONTAINER */
.container {
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* GLASS CARD */
.glass {
  background: rgba(255,255,255,0.08);
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  backdrop-filter: blur(10px);
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

/* LOGIN */
.login {
  max-width:300px;
  margin:120px auto;
  text-align:center;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}
button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#d4af37;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
button:hover {
  background:#f1c40f;
}

/* CARD LIST */
.card {
  display:flex;
  align-items:center;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.05);
}
.card img {
  width:55px;
  height:55px;
  border-radius:50%;
  margin-right:15px;
  object-fit:cover;
}
.badge {
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}
.hadir{background:#2ecc71;}
.cuti{background:#f39c12;}
.tiada{background:#e74c3c;}

.hidden{display:none;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="LOGO_URL_DI_SINI">
  <h1>Majlis Daerah Simunjan<br><small>Sistem Pergerakan Pegawai</small></h1>
</div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="glass login">
  <h2>Login Sistem</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Masuk</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<div class="glass">
  <h3>Tambah Pegawai (Admin)</h3>
  <input id="nama" placeholder="Nama">
  <input id="jawatan" placeholder="Jawatan">
  <input id="jabatan" placeholder="Jabatan">
  <input id="status" placeholder="Status (Hadir/Cuti/Tiada)">
  <input id="gambar" placeholder="URL Gambar">
  <button onclick="add()">Tambah</button>
</div>

<div class="glass">
  <h3>Statistik Pegawai</h3>
  <canvas id="chart"></canvas>
</div>

<div class="glass">
  <h3>Senarai Pegawai</h3>
  <div id="list"></div>
</div>

</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwpeAhkzHSI2w3jkye__venDhYgam0Zpjj_4u-Yct6byS5BZvDl0lS90YCNZg0VBVkFHQ/exec";
let session={};

// LOGIN
async function login(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      username:username.value,
      password:password.value
    })
  });
  let data = await res.json();

  if(data.status==="success"){
    session=data;
    loginBox.classList.add("hidden");
    app.classList.remove("hidden");
    load();
  } else alert("Login gagal");
}

// LOAD DATA
async function load(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"getData",
      role:session.role,
      jabatan:session.jabatan
    })
  });

  let data = await res.json();
  render(data);
  chart(data);
}

// PAPAR DATA
function render(data){
  list.innerHTML="";
  data.forEach(d=>{
    let statusClass=d.status.toLowerCase();

    list.innerHTML+=`
    <div class="card">
      <img src="${d.gambar_url}">
      <div style="flex:1">
        <b>${d.nama}</b><br>
        ${d.jawatan} (${d.jabatan})<br>
        <span class="badge ${statusClass}">${d.status}</span>
        <div>${d.catatan||""}</div>
      </div>
      ${session.role==="admin" ? `<button onclick="del('${d.id}')">Padam</button>` : ""}
    </div>`;
  });
}

// TAMBAH
async function add(){
  if(session.role!=="admin") return alert("Admin sahaja");

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      nama:nama.value,
      jawatan:jawatan.value,
      jabatan:jabatan.value,
      status:status.value,
      gambar_url:gambar.value
    })
  });
  load();
}

// DELETE
async function del(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"delete", id})
  });
  load();
}

// CHART
function chart(data){
  let kira={};
  data.forEach(d=>{
    kira[d.status]=(kira[d.status]||0)+1;
  });

  new Chart(chartCanvas=document.getElementById("chart"),{
    type:"doughnut",
    data:{
      labels:Object.keys(kira),
      datasets:[{
        data:Object.values(kira),
        backgroundColor:["#2ecc71","#f39c12","#e74c3c"]
      }]
    }
  });
}
</script>

</body>
</html>
