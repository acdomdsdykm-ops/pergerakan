<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard Pegawai</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}
.container { padding:20px; }
.glass {
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  margin-bottom:20px;
}
.card {
  display:flex;
  align-items:center;
  margin-bottom:10px;
}
.card img {
  width:50px;height:50px;border-radius:50%;margin-right:10px;
}
button { padding:8px 12px; border:none; border-radius:8px; background:#00c6ff; color:white; }
.hidden{display:none;}
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="glass">
  <h2>Login</h2>
  <input id="u" placeholder="Username"><br><br>
  <input id="p" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

<h1>📊 Dashboard Pegawai</h1>

<div class="glass">
  <h3>Tambah Pegawai (Admin)</h3>
  <input id="nama" placeholder="Nama">
  <input id="jawatan" placeholder="Jawatan">
  <input id="jabatan" placeholder="Jabatan">
  <input id="status" placeholder="Status">
  <input id="gambar" placeholder="URL Gambar">
  <button onclick="add()">Tambah</button>
</div>

<div class="glass">
  <h3>Statistik</h3>
  <canvas id="chart"></canvas>
</div>

<div class="glass">
  <h3>Senarai Pegawai</h3>
  <div id="list"></div>
</div>

</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwpeAhkzHSI2w3jkye__venDhYgam0Zpjj_4u-Yct6byS5BZvDl0lS90YCNZg0VBVkFHQ/exec";

let session = {};

async function login(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      username:u.value,
      password:p.value
    })
  });
  let data = await res.json();

  if(data.status==="success"){
    session=data;
    loginBox.classList.add("hidden");
    app.classList.remove("hidden");
    load();
  } else alert("Login gagal");
}

async function load(){
  let res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"getData",
      role:session.role,
      jabatan:session.jabatan
    })
  });

  let data = await res.json();
  render(data);
  drawChart(data);
}

function render(data){
  list.innerHTML="";
  data.forEach(d=>{
    list.innerHTML+=`
    <div class="card">
      <img src="${d.gambar_url}">
      <div>
        <b>${d.nama}</b><br>
        ${d.jawatan} (${d.jabatan})<br>
        ${d.status}
      </div>
      <button onclick="del('${d.id}')">X</button>
    </div>`;
  });
}

async function add(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      nama:nama.value,
      jawatan:jawatan.value,
      jabatan:jabatan.value,
      status:status.value,
      gambar_url:gambar.value
    })
  });
  load();
}

async function del(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"delete", id})
  });
  load();
}

function drawChart(data){
  let kira = {};
  data.forEach(d=>{
    kira[d.status]=(kira[d.status]||0)+1;
  });

  new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{
      labels:Object.keys(kira),
      datasets:[{
        data:Object.values(kira),
        backgroundColor:['#00c851','#ffbb33','#ff4444']
      }]
    }
  });
}
</script>

</body>
</html>
