<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDS - Sistem Pergerakan Pegawai</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#eef2f5;
}

/* LOGIN */
#loginBox{
  width:320px;
  margin:120px auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
#loginBox input{
  width:100%;
  padding:10px;
  margin:8px 0;
}
#loginBox button{
  width:100%;
  padding:10px;
  background:#0b3d2e;
  color:white;
  border:none;
  border-radius:8px;
}

/* APP */
#app{display:none;}

.topbar{
  background:#0b3d2e;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
.topbar button{
  background:#c0392b;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
}

/* LAYOUT */
.wrapper{display:flex;min-height:100vh;}

.sidebar{
  width:230px;
  background:#0b3d2e;
  color:white;
}

.sidebar button{
  width:100%;
  padding:12px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
}
.sidebar button:hover{background:rgba(255,255,255,0.1);}

.main{flex:1;padding:15px;}

.panel{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card{
  display:flex;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
}
.card img{
  width:45px;height:45px;border-radius:50%;
}

input{
  padding:8px;
  margin:5px 0;
  width:100%;
}

/* MOBILE */
@media(max-width:768px){
  .wrapper{flex-direction:column;}
  .sidebar{width:100%;}
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h3>🔐 Login Sistem MDS</h3>
  <input id="u" placeholder="Username">
  <input id="p" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ================= APP ================= -->
<div id="app">

<div class="topbar">
  <div><b>MAJLIS DAERAH SIMUNJAN</b></div>
  <button onclick="logout()">Logoff</button>
</div>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="show('summary')">📊 Summary Jabatan</button>
  <button onclick="show('search')">🔍 Carian</button>
  <button onclick="show('add')">➕ Tambah Pegawai</button>
  <button onclick="show('list')">🏢 Senarai Jabatan</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- SUMMARY -->
<div id="summary" class="panel section">
  <h3>📊 Summary Jabatan</h3>
  <div id="summaryBox"></div>
</div>

<!-- SEARCH -->
<div id="search" class="panel section" style="display:none;">
  <h3>🔍 Carian Pegawai</h3>
  <input id="searchInput" placeholder="Cari nama / jawatan...">
  <div id="searchResult"></div>
</div>

<!-- ADD -->
<div id="add" class="panel section" style="display:none;">
  <h3>➕ Tambah Pegawai</h3>

  <input id="nama" placeholder="Nama">
  <input id="jawatan" placeholder="Jawatan">
  <input id="jabatan" placeholder="Jabatan">
  <input id="status" placeholder="Status">

  <button onclick="add()">Simpan</button>
</div>

<!-- LIST -->
<div id="list" class="panel section" style="display:none;">
  <h3>🏢 Senarai Mengikut Jabatan</h3>
  <div id="listBox"></div>
</div>

</div>
</div>
</div>

<script>

/* ================= DATA SIMULASI (boleh connect Apps Script nanti) ================= */
let dataGlobal = [
  {nama:"Ali", jawatan:"Pegawai", jabatan:"Pentadbiran", status:"Hadir"},
  {nama:"Siti", jawatan:"Pembantu", jabatan:"Kewangan", status:"Cuti"},
  {nama:"Rahman", jawatan:"Pegawai", jabatan:"Pentadbiran", status:"Hadir"}
];

/* ================= LOGIN ================= */
function login(){
  let u = document.getElementById("u").value;
  let p = document.getElementById("p").value;

  if(u && p){
    sessionStorage.setItem("login","1");
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    load();
  } else {
    alert("Isi login");
  }
}

/* ================= LOGOUT ================= */
function logout(){
  sessionStorage.clear();
  location.reload();
}

/* ================= NAV ================= */
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* ================= LOAD ================= */
function load(){
  renderSummary();
  renderList();
  renderSearch();
}

/* ================= SUMMARY ================= */
function renderSummary(){

  let group={};

  dataGlobal.forEach(d=>{
    group[d.jabatan]=(group[d.jabatan]||0)+1;
  });

  let html="";
  for(let j in group){
    html+=`<div>🏢 ${j}: <b>${group[j]}</b></div>`;
  }

  summaryBox.innerHTML=html;
}

/* ================= LIST ================= */
function renderList(){

  let group={};

  dataGlobal.forEach(d=>{
    if(!group[d.jabatan]) group[d.jabatan]=[];
    group[d.jabatan].push(d);
  });

  let html="";

  for(let j in group){

    html+=`<h3>🏢 ${j}</h3>`;

    group[j].forEach(p=>{
      html+=`
      <div class="card">
        <img src="https://via.placeholder.com/45">
        <div>
          <b>${p.nama}</b><br>
          ${p.jawatan} | ${p.status}
        </div>
      </div>`;
    });
  }

  listBox.innerHTML=html;
}

/* ================= SEARCH ================= */
function renderSearch(){

  searchInput.onkeyup=function(){

    let k=this.value.toLowerCase();

    let f=dataGlobal.filter(d=>
      d.nama.toLowerCase().includes(k) ||
      d.jawatan.toLowerCase().includes(k)
    );

    let html="";

    f.forEach(p=>{
      html+=`
      <div class="card">
        <img src="https://via.placeholder.com/45">
        <div>
          <b>${p.nama}</b><br>
          ${p.jawatan} | ${p.status}
        </div>
      </div>`;
    });

    searchResult.innerHTML=html;
  };
}

/* ================= ADD ================= */
function add(){

  dataGlobal.push({
    nama:nama.value,
    jawatan:jawatan.value,
    jabatan:jabatan.value,
    status:status.value
  });

  nama.value="";
  jawatan.value="";
  jabatan.value="";
  status.value="";

  load();
}

/* ================= INIT ================= */
if(sessionStorage.getItem("login")==="1"){
  loginBox.style.display="none";
  app.style.display="block";
  load();
}

</script>

</body>
</html>
