<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRMIS PREMIUM SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#eef2f6;
  color:#1a1a1a;
}

/* LOGIN */
#loginBox{
  width:340px;
  margin:120px auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* APP CENTERED */
#app{
  display:none;
  max-width:1200px;
  margin:30px auto;
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

/* HEADER */
.header{
  background:#0b2e4a;
  color:#fff;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LAYOUT */
.container{display:flex}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#f7f9fc;
  border-right:1px solid #e5e9f0;
  padding:15px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#0b2e4a;
  color:#fff;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
  background:#f4f7fb;
}

/* PANELS */
.panel{
  background:#fff;
  border-radius:12px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 4px 18px rgba(0,0,0,0.05);
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #d9dee7;
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.kpi-box{
  background:linear-gradient(135deg,#0b2e4a,#1d5c8f);
  color:#fff;
  padding:16px;
  border-radius:12px;
  text-align:center;
}

.kpi-box h2{
  margin:5px 0;
  font-size:26px;
}

/* LIST */
.list-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
}

/* IMAGE */
img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #0b2e4a;
}

/* MOBILE */
@media(max-width:900px){
  .container{flex-direction:column}
  .sidebar{width:100%}
  .kpi{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h3>LOGIN HRMIS</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="doLogin()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<div>🏛 HRMIS PREMIUM SYSTEM</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<button onclick="load()">Dashboard</button>
<button onclick="toggleForm()">Tambah Pegawai</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- KPI -->
<div class="panel">
<h3 style="color:#0b2e4a">📊 Dashboard Utama</h3>

<div class="kpi">
<div class="kpi-box">
<div>Total</div>
<h2 id="total">0</h2>
</div>

<div class="kpi-box">
<div>Hadir</div>
<h2 id="hadir">0</h2>
</div>

<div class="kpi-box">
<div>Cuti</div>
<h2 id="cuti">0</h2>
</div>
</div>

</div>

<!-- SEARCH -->
<div class="panel">
<input id="search" placeholder="🔍 Cari pegawai..." oninput="render()">
</div>

<!-- LIST -->
<div class="panel" id="list"></div>

<!-- FORM -->
<div class="panel" id="form" style="display:none;">
<h3>➕ Tambah Pegawai</h3>

<input id="nama">
<input id="jawatan">
<input id="jabatan">

<select id="status">
<option>Hadir</option>
<option>Cuti</option>
</select>

<input id="catatan">

<input type="file" id="photo">

<button onclick="add()">Simpan</button>
</div>

</div>
</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyNmIrv1ifNBiCeIuLy92qmt9uHp-16FyEXvEaKEptE4HeptYc0JKHpukSMT6grTKBz2g/exec";

let DATA = [];

/* ================= API (NO CORS ISSUE) ================= */
async function api(payload){

  const form = new URLSearchParams();

  for(const k in payload){
    form.append(k, payload[k]);
  }

  const res = await fetch(API,{method:"POST",body:form});
  return res.json();
}

/* ================= LOGIN ================= */
async function doLogin(){

  const r = await api({
    action:"login",
    username:u.value,
    password:p.value
  });

  if(r.status==="ok"){
    localStorage.setItem("token", r.token);

    loginBox.style.display="none";
    app.style.display="block";

    load();
  }else{
    alert("Login gagal");
  }
}

/* ================= LOAD ================= */
async function load(){

  DATA = await (await fetch(API+"?action=getPegawai")).json();

  updateKPI();
  render();
}

/* ================= KPI ================= */
function updateKPI(){

  const h = DATA.filter(x=>x.status==="Hadir").length;
  const c = DATA.filter(x=>x.status==="Cuti").length;

  total.innerText = DATA.length;
  hadir.innerText = h;
  cuti.innerText = c;
}

/* ================= RENDER LIST ================= */
function render(){

  const k = search.value.toLowerCase();

  list.innerHTML = DATA
    .filter(x => (x.nama||"").toLowerCase().includes(k))
    .map(x=>`
      <div class="list-item">
        ${x.photo ? `<img src="${x.photo}">` : ""}
        <div>
          <div style="font-weight:600">${x.nama}</div>
          <small>${x.jawatan} • ${x.jabatan} • ${x.status}</small>
        </div>
      </div>
    `).join("");
}

/* ================= ADD ================= */
async function add(){

  const file = photo.files[0];

  let img = "";
  if(file){
    img = await new Promise(r=>{
      const fr = new FileReader();
      fr.onload=()=>r(fr.result);
      fr.readAsDataURL(file);
    });
  }

  await api({
    action:"addPegawai",
    token: localStorage.getItem("token"),
    nama:nama.value,
    jawatan:jawatan.value,
    jabatan:jabatan.value,
    status:status.value,
    catatan:catatan.value,
    photo:img
  });

  toggleForm();
  load();
}

/* ================= UI ================= */
function toggleForm(){
  form.style.display = form.style.display==="block"?"none":"block";
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* ================= AUTO REFRESH ================= */
setInterval(()=>{
  if(app.style.display==="block") load();
},10000);

</script>

</body>
</html>
