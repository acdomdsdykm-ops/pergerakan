<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial; padding: 20px; background:#f4f6f9; }
    .card { background:white; padding:15px; margin:10px; border-radius:10px; }
    img { width:100%; height:180px; object-fit:cover; }
    input, select, button { padding:10px; margin:5px; width:100%; }
  </style>
</head>

<body>

<h2>Sistem Pemantauan Staf</h2>

<div id="adminPanel" style="display:none">
  <h3>Admin Panel - Tambah Staf</h3>

  <input id="nama" placeholder="Nama">
  <input id="jawatan" placeholder="Jawatan">
  <input id="bahagian" placeholder="Bahagian">
  <input type="file" id="photo">

  <button onclick="addStaff()">Tambah Staf</button>

  <hr>

  <h3>Update Status</h3>

  <select id="staffList"></select>

  <select id="status">
    <option>Ada</option>
    <option>Tiada</option>
    <option>Cuti</option>
    <option>Urusan Rasmi di Luar</option>
  </select>

  <input id="catatan" placeholder="Catatan">

  <button onclick="updateStatus()">Update Status</button>
</div>

<hr>

<div id="list"></div>

<script>
let USER_EMAIL = Session.getActiveUser().getEmail(); // Apps Script auto email
let ROLE = "";

function init() {
  google.script.run.withSuccessHandler(role => {
    ROLE = role;

    if (ROLE === "admin") {
      document.getElementById("adminPanel").style.display = "block";
    }

    loadStaff();
  }).getRole(USER_EMAIL);
}

function loadStaff() {
  google.script.run.withSuccessHandler(staff => {
    google.script.run.withSuccessHandler(statusMap => {

      let html = "";
      let dropdown = "";

      staff.forEach(s => {
        let st = statusMap[s.id] || {status:"-", catatan:""};

        html += `
          <div class="card">
            <img src="${s.photo}">
            <h3>${s.nama}</h3>
            <p>${s.jawatan} - ${s.bahagian}</p>
            <p><b>Status:</b> ${st.status}</p>
            <p>${st.catatan || ""}</p>
          </div>
        `;

        dropdown += `<option value="${s.id}">${s.nama}</option>`;
      });

      document.getElementById("list").innerHTML = html;
      document.getElementById("staffList").innerHTML = dropdown;

    }).getStatus();

  }).getStaff();
}

function addStaff() {
  let file = document.getElementById("photo").files[0];

  let reader = new FileReader();
  reader.onload = function(e) {

    google.script.run.addStaff({
      nama: nama.value,
      jawatan: jawatan.value,
      bahagian: bahagian.value,
      photo: e.target.result
    }, USER_EMAIL);

    alert("Berjaya tambah staf");
    loadStaff();
  };

  reader.readAsDataURL(file);
}

function updateStatus() {
  google.script.run.updateStatus({
    id: staffList.value,
    status: status.value,
    catatan: catatan.value
  }, USER_EMAIL);

  alert("Status dikemaskini");
  loadStaff();
}

init();
</script>

</body>
</html>
