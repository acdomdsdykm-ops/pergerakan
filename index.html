<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR System Cloud FIXED</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:#e5e7eb}
input,select,button{padding:10px;width:260px;margin:5px;border-radius:10px;border:none}
button{background:#3b82f6;color:white;cursor:pointer}
.main{display:none}
.container{display:flex;height:100vh}
.sidebar{width:220px;background:#111827;padding:10px}
.menu{padding:10px;cursor:pointer;border-radius:8px;margin-bottom:5px}
.menu:hover{background:#1f2937}
.page{display:none;padding:15px;flex:1;overflow:auto}
.staff-card{background:#111827;padding:10px;margin:8px;border-radius:10px}
.status{padding:5px 10px;border-radius:20px;cursor:pointer;display:inline-block}
.hadir{background:#22c55e}
.cuti{background:#f59e0b;color:black}
.tiada{background:#ef4444}
.urusan{background:#3b82f6}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>LOGIN HR</h2>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button id="loginBtn">Login</button>
</div>

<!-- MAIN -->
<div class="main">
<div class="container">

<div class="sidebar">
<div class="menu" onclick="show('dashboard')">Dashboard</div>
<div class="menu" onclick="show('staff')">Staff</div>
<div class="menu" onclick="show('add')">Add Staff</div>
</div>

<!-- DASHBOARD -->
<div class="page" id="dashboard">
<h2>Dashboard</h2>
<h3 id="total">0</h3>
</div>

<!-- STAFF -->
<div class="page" id="staff">
<input id="search" placeholder="Search..." oninput="render()">
<div id="staffView"></div>
</div>

<!-- ADD -->
<div class="page" id="add">
<h2>Add Staff</h2>
<input id="name" placeholder="Nama">
<input id="job" placeholder="Jawatan">
<input id="dept" placeholder="Bahagian">

<select id="status">
<option>Hadir</option>
<option>Cuti</option>
<option>Tiada</option>
<option>Urusan Rasmi Di Luar</option>
</select>

<button onclick="saveStaff()">Simpan</button>
</div>

</div>
</div>

<script>

const API = "PASTE_WEB_APP_URL_HERE";

let staff = [];

/* LOGIN (FIXED GLOBAL) */
window.login = function(){
const u = document.getElementById("user").value;
const p = document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginPage").style.display="none";
document.querySelector(".main").style.display="flex";
show("dashboard");
loadStaff();
}else{
alert("Salah login");
}
}

/* attach button safely */
document.getElementById("loginBtn").addEventListener("click", login);

/* NAV */
window.show = function(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
render();
}

/* LOAD */
async function loadStaff(){
try{
const res = await fetch(API,{
method:"POST",
body:JSON.stringify({action:"getStaff"})
});
staff = await res.json();
render();
}catch(e){
alert("API error / Google Script belum deploy");
console.log(e);
}
}

/* SAVE */
window.saveStaff = async function(){

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"addStaff",
name:name.value,
job:job.value,
dept:dept.value,
status:status.value,
photo:"https://i.pravatar.cc/150"
})
});

loadStaff();
show("staff");
}

/* DELETE */
window.del = async function(id){
await fetch(API,{
method:"POST",
body:JSON.stringify({action:"deleteStaff",id})
});
loadStaff();
}

/* STATUS TOGGLE */
window.toggleStatus = async function(id){

let s = staff.find(x=>x.id===id);
let order=["Hadir","Cuti","Tiada","Urusan Rasmi Di Luar"];
let newStatus = order[(order.indexOf(s.status)+1)%order.length];

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"updateStaff",
id:id,
name:s.name,
job:s.job,
dept:s.dept,
status:newStatus,
photo:s.photo
})
});

loadStaff();
}

/* RENDER */
function render(){

total.innerText = staff.length;

let kw = (search.value||"").toLowerCase();

let html = staff
.filter(s=>s.name.toLowerCase().includes(kw))
.map(s=>{

let cls =
s.status==="Hadir"?"hadir":
s.status==="Cuti"?"cuti":
s.status==="Tiada"?"tiada":"urusan";

return `
<div class="staff-card">
<b>${s.name}</b><br>
${s.job}<br>
${s.dept}<br>

<span class="status ${cls}" onclick="toggleStatus(${s.id})">
${s.status}
</span>

<br><button onclick="del(${s.id})">Delete</button>
</div>
`;
}).join("");

staffView.innerHTML = html;
}

/* START */
show("dashboard");

</script>

</body>
</html>
