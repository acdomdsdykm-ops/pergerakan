<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRMIS FINAL SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0f2f24;color:#fff}

#loginBox{
  width:320px;margin:80px auto;background:#fff;color:#000;
  padding:20px;border-radius:10px;
}

#app{display:none}

.header{
  display:flex;justify-content:space-between;
  padding:15px;background:#00000055;
}

.container{display:flex}

.sidebar{width:220px;background:#00000033;min-height:100vh;padding:10px}

.sidebar button{width:100%;margin:5px 0;padding:10px}

.main{flex:1;padding:15px}

.panel{background:#ffffff11;padding:15px;margin-bottom:10px;border-radius:10px}

img{border-radius:50%}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h3>LOGIN HRMIS</h3>
<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">
<button onclick="doLogin()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<div>🏛 HRMIS FINAL</div>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="sidebar">
<button onclick="load()">Dashboard</button>
<button onclick="toggleForm()">Tambah</button>
</div>

<div class="main">

<div class="panel">
<h3>KPI</h3>
<canvas id="chart"></canvas>
</div>

<div class="panel">
<input id="search" placeholder="Search..." oninput="render()">
</div>

<div class="panel" id="list"></div>

<div class="panel" id="form" style="display:none;">
<h3>Tambah Pegawai</h3>

<input id="nama">
<input id="jawatan">
<input id="jabatan">

<select id="status">
<option>Hadir</option>
<option>Cuti</option>
</select>

<input id="catatan">

<input type="file" id="photo">

<button onclick="add()">Simpan</button>
</div>

</div>
</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyNmIrv1ifNBiCeIuLy92qmt9uHp-16FyEXvEaKEptE4HeptYc0JKHpukSMT6grTKBz2g/exec";
let DATA = [];
let token = localStorage.getItem("token");

/* ================= API ================= */
async function api(payload){

  const form = new URLSearchParams();

  for(const k in payload){
    form.append(k, payload[k]);
  }

  const res = await fetch(API,{method:"POST",body:form});
  return res.json();
}

/* ================= LOGIN ================= */
async function doLogin(){

  const r = await api({
    action:"login",
    username:u.value,
    password:p.value
  });

  if(r.status==="ok"){
    localStorage.setItem("token", r.token);
    loginBox.style.display="none";
    app.style.display="block";
    load();
  }else{
    alert("Login failed");
  }
}

/* ================= LOAD ================= */
async function load(){

  DATA = await (await fetch(API+"?action=getPegawai")).json();

  render();
  chart();
}

/* ================= RENDER ================= */
function render(){

  const k = search.value.toLowerCase();

  list.innerHTML = DATA
    .filter(x => (x.nama||"").toLowerCase().includes(k))
    .map(x=>`
      <div>
        ${x.photo ? `<img src="${x.photo}" width="40">` : ""}
        ${x.nama} - ${x.jawatan} (${x.status})
      </div>
    `).join("");
}

/* ================= CHART ================= */
let c;

function chart(){

  const h = DATA.filter(x=>x.status==="Hadir").length;
  const c1 = DATA.filter(x=>x.status==="Cuti").length;

  if(c) c.destroy();

  c = new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["Hadir","Cuti"],
      datasets:[{data:[h,c1],backgroundColor:["#0f0","#f00"]}]
    }
  });
}

/* ================= ADD ================= */
async function add(){

  const file = photo.files[0];
  let img = "";

  if(file){
    img = await new Promise(r=>{
      const fr = new FileReader();
      fr.onload = ()=>r(fr.result);
      fr.readAsDataURL(file);
    });
  }

  await api({
    action:"addPegawai",
    token: localStorage.getItem("token"),
    nama:nama.value,
    jawatan:jawatan.value,
    jabatan:jabatan.value,
    status:status.value,
    catatan:catatan.value,
    photo:img
  });

  toggleForm();
  load();
}

/* ================= UI ================= */
function toggleForm(){
  form.style.display = form.style.display==="block"?"none":"block";
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* ================= AUTO REFRESH ================= */
setInterval(()=>{
  if(app.style.display==="block") load();
},10000);

</script>

</body>
</html>
