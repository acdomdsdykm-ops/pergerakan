<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Majlis Daerah Simunjan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f3d2e,#145a32);
  color:white;
}
.container{padding:20px;}
.glass{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}
input,button{padding:8px;margin:5px;border-radius:8px;border:none;}
button{background:#d4af37;cursor:pointer;}
.card{display:flex;align-items:center;margin-bottom:10px;}
.card img{width:50px;height:50px;border-radius:50%;margin-right:10px;}
.hidden{display:none;}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logout{
  background:#e74c3c;
  color:white;
}
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="glass">
  <h2>Login</h2>
  <input id="u" placeholder="Username">
  <input id="p" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="topbar">
  <h1>Majlis Daerah Simunjan</h1>
  <button class="logout" onclick="logout()">Logoff</button>
</div>

<div class="glass">
  <h3>Tambah Pegawai</h3>
  <input id="nama" placeholder="Nama">
  <input id="jawatan" placeholder="Jawatan">
  <input id="jabatan" placeholder="Jabatan">
  <input id="status" placeholder="Status">
  <input type="file" id="file">
  <button onclick="add()">Tambah</button>
</div>

<div class="glass">
  <h3>📈 Graf Pergerakan Pegawai</h3>
  <canvas id="chart"></canvas>
</div>

<div class="glass">
  <h3>📅 Calendar</h3>
  <div id="calendar"></div>
</div>

<div class="glass">
  <h3>Senarai Pegawai</h3>
  <div id="list"></div>
</div>

</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzrCoKNBPCou3lbMBa4RYqb2r9Mhcqbn6W4M33K_Qfj4HBvPk7jaZJBhjFVG-4L3tl-HQ/exec";
let session={};
let chartInstance=null;

// LOGIN
async function login(){
  let res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      username:u.value,
      password:p.value
    })
  });
  let data=await res.json();

  if(data.status==="success"){
    session=data;
    loginBox.classList.add("hidden");
    app.classList.remove("hidden");
    load();
  }else alert("Login gagal");
}

// LOGOUT
function logout(){
  session={};
  app.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

// LOAD DATA
async function load(){
  let res=await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"getData",
      role:session.role,
      jabatan:session.jabatan
    })
  });

  let data=await res.json();
  render(data);
  drawGraph(data);
  calendar(data);
}

// RENDER
function render(data){
  list.innerHTML="";
  data.forEach(d=>{
    list.innerHTML+=`
    <div class="card">
      <img src="${d.gambar_url}">
      <div>
        <b>${d.nama}</b><br>
        ${d.jawatan} (${d.jabatan})<br>
        ${d.status}
      </div>
      <button onclick="del('${d.id}')">X</button>
    </div>`;
  });
}

// ADD
async function add(){
  let file=document.getElementById("file").files[0];
  let base64="";

  if(file){
    base64=await toBase64(file);
  }

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      nama:nama.value,
      jawatan:jawatan.value,
      jabatan:jabatan.value,
      status:status.value,
      image_base64:base64
    })
  });

  load();
}

// DELETE
async function del(id){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"delete",id})
  });
  load();
}

// BASE64
function toBase64(file){
  return new Promise((res,rej)=>{
    let reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=()=>res(reader.result.split(',')[1]);
  });
}

// 📈 GRAPH (LINE CHART)
function drawGraph(data){

  let byDate={};

  data.forEach(d=>{
    let date=new Date(d.tarikh).toLocaleDateString();
    byDate[date]=(byDate[date]||0)+1;
  });

  let labels=Object.keys(byDate);
  let values=Object.values(byDate);

  if(chartInstance){
    chartInstance.destroy();
  }

  chartInstance=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Jumlah Pergerakan",
        data:values,
        borderColor:"#f1c40f",
        backgroundColor:"rgba(241,196,15,0.2)",
        tension:0.3,
        fill:true
      }]
    }
  });
}

// 📅 CALENDAR
function calendar(data){
  let events=data.map(d=>({
    title:d.nama+" ("+d.status+")",
    start:d.tarikh
  }));

  let cal=new FullCalendar.Calendar(
    document.getElementById("calendar"),
    {
      initialView:"dayGridMonth",
      events:events
    }
  );
  cal.render();
}
</script>

</body>
</html>
